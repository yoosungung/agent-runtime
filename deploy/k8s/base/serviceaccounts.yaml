# Dedicated ServiceAccounts per component.
# automountServiceAccountToken: false prevents unneeded k8s API access.
# auth and deploy-api are the only services with Postgres credentials (enforced by NetworkPolicy + Secret binding).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: auth
  namespace: runtime
automountServiceAccountToken: false
imagePullSecrets:
  - name: ncr-creds
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: deploy-api
  namespace: runtime
automountServiceAccountToken: false
imagePullSecrets:
  - name: ncr-creds
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-pool
  namespace: runtime
automountServiceAccountToken: false
imagePullSecrets:
  - name: ncr-creds
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-pool
  namespace: runtime
automountServiceAccountToken: false
imagePullSecrets:
  - name: ncr-creds
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ext-authz
  namespace: runtime
automountServiceAccountToken: false
imagePullSecrets:
  - name: ncr-creds
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: envoy
  namespace: runtime
automountServiceAccountToken: false
imagePullSecrets:
  - name: ncr-creds
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend
  namespace: runtime
automountServiceAccountToken: true  # required for K8s API (custom image mode pool management)
imagePullSecrets:
  - name: ncr-creds
---
# ServiceAccount used by all image-mode pool pods (set as serviceAccountName in manifests).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pool-base
  namespace: runtime
automountServiceAccountToken: false
imagePullSecrets:
  - name: ncr-creds
