apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: runtime
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      serviceAccountName: auth
      containers:
        - name: auth
          image: agents-runtime/auth:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          envFrom:
            - configMapRef:
                name: runtime-env
            - secretRef:
                name: postgres-credentials
            - secretRef:
                name: jwt-keys
          env:
            - name: SERVICE_NAME
              value: auth
            - name: GRACE_MAX_SEC
              value: "600"
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: runtime
spec:
  selector:
    app: auth
  ports:
    - port: 8080
      targetPort: 8080
