# NOTE: jwt-keys Secret is intentionally absent from this file.
# It is managed separately via `make jwt-secret` to prevent kubectl apply -k
# from overwriting real PEM keys with placeholder values on every deploy.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: runtime
type: Opaque
stringData:
  # Password used by pgbouncer to authenticate against Postgres.
  POSTGRES_PASSWORD: "runtime"
  # Write path: deploy-api → pgbouncer-rw → primary Postgres.
  POSTGRES_DSN: "postgresql+asyncpg://runtime:runtime@pgbouncer-rw.runtime.svc.cluster.local:5432/runtime"
  # Read path: deploy-api → pgbouncer-ro → read replica (or primary in dev).
  POSTGRES_READ_DSN: "postgresql+asyncpg://runtime:runtime@pgbouncer-ro.runtime.svc.cluster.local:5432/runtime"
  # Tells deploy-api to enable PgBouncer-compatible engine settings.
  POSTGRES_PGBOUNCER: "true"
  # Direct DSN for the migration job (psql, bypasses pgbouncer).
  POSTGRES_DIRECT_DSN: "postgresql://runtime:runtime@postgres.runtime.svc.cluster.local:5432/runtime"
